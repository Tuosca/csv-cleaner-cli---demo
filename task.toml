# ---------------------------------------------------------
# 核心版本控制
# ---------------------------------------------------------
version = "1.0"

# ---------------------------------------------------------
# [metadata] 元数据：用于数据治理和难度分级
# ---------------------------------------------------------
[metadata]
author_name  = "Huang Junsen"
author_email = "1906900946@qq.com"

# 难度：实现难度不高，但边界处理细节多 → medium
difficulty = "medium"

# 类别
category = "software-engineering"

# 标签：涵盖本题核心技能点
tags = ["python", "csv", "cli", "data-cleaning", "argparse"]

# 专家（熟悉 pandas/csv 模块）约 120 分钟可完成
expert_time_estimate_min = 120.0

# 初级工程师需要摸索 CLI 写法和边界处理，约 360 分钟
junior_time_estimate_min = 660.0

# ---------------------------------------------------------
# [verifier] 验证器配置
# ---------------------------------------------------------
[verifier]
timeout_sec = 120.0

# ---------------------------------------------------------
# [agent] Agent 配置
# ---------------------------------------------------------
[agent]
timeout_sec = 1200.0

# ---------------------------------------------------------
# [environment] 环境配置
# ---------------------------------------------------------
[environment]
build_timeout_sec = 300.0
docker_image      = "custom-bench/csv-cleaner-cli:v1"
cpus              = 1
memory            = "1G"
storage           = "5G"
